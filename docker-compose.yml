services:
  tracker:
    build: .
    container_name: telegram-tracker
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8005:8000"
    volumes:
      # Persist the session file so it survives container rebuilds
      - ./tracker_session.session:/app/tracker_session.session
      # Expose downloads to the host so they are easily accessible and persistent
      - ./downloads:/app/downloads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
